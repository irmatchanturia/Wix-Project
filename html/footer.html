<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/footer.css">
    <title>Coaching Professional Website Template</title>
</head>
<body>

<footer>
    <div class="footer-main">

        <div class="footer-left">

            <div class="footer-line"></div>
            <h3>CONTACT</h3>

            <div class="adrress">
                <p>500 Terry Francois Street</p>
                <p>San Francisco, CA 94158</p>
            </div>

            <div class="numbers">
                <p>Tel: 123-456-7890</p>
                <p>Fax: 123-456-7890</p>
            </div>

            <div class="info">
                <p>info@mysite.com</p>
            </div>

            <div class="links">
                <a href="https://www.facebook.com/wix" target="_blank">
                    <img src="../images/facebook-app-symbol.png" alt="facebook logo">
                </a>
                <a href="https://x.com/wix" target="_blank">
                    <img src="../images/twitter.png" alt="twitter logo">
                </a>
                <a href="https://www.instagram.com/wix/" target="_blank">
                    <img src="../images/instagram.png" alt="instagram logo">
                </a>
                <a href="https://www.youtube.com/user/Wix" target="_blank">
                    <img src="../images/youtube.png" alt="youtube logo">
                </a>
            </div>

                <p>© 2023 by Personal Life Coach.
                <br>Powered and secured by <a href="https://www.wix.com/?utm_campaign=vir_created_with">Wix</a></p>
        </div>

        <div class="footer-right">
            <form>
                <div class="name-field">
                    <label for="name">Enter Your Name *</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>
                <div class="email-field">
                    <label for="email">Enter Your Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="subject">
                    <label for="subject">Enter Your Subject *</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="textarea">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="8" required></textarea>
                </div>
                <button class="footer-button" type="submit">Submit</button>
            </form>
        </div>
    </div>
</footer>
    
</body>
</html>
